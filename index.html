<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>CGPA Calculator</h1>

    <p>Calculate your CGPA </p>

    <label>Select Number of Semesters Completed</label>

    <select id="semesterCount">
        <option value="">Select</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
    </select>

    <div id="semesterInputs"></div>

    <button onclick="calculateCGPA()">
        Calculate CGPA
    </button>

    <h2 id="cgpaResult">CGPA: --</h2>

<div class="circle">
    <span id="cgpaValue">--</span>
</div>
    <hr>

    <h3>Target CGPA</h3>

    <input
        type="number"
        step="0.01"
        id="targetCGPA"
        placeholder="Enter overall Target CGPA">

    <button onclick="calculateRequiredSGPA()">
        Calculate Required SGPA in further Semesters
    </button>

    <div class="result-card">
        <p id="targetResult"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
